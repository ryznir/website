<body>

  <div class="page-wrapper-wide">

    <div class="card" style="margin-bottom:0">
      <div class="card-title">ALL PHOTO GALLERIES</div>
      <p style="color:var(--text-mid);font-size:14px">Click an album to expand and view photos. Add your images by replacing the photo slots with <code style="background:var(--bg2);padding:1px 5px;border-radius:3px">&lt;img&gt;</code> tags.</p>
    </div>

    <div class="albums-grid" id="albums-grid">
      <!-- Albums will be generated here from gallery_data.json -->
    </div>

    <script>
      // Utility to create DOM elements with classes/attrs
      function el(tag, options = {}){
        const d = document.createElement(tag);
        if(options.class) d.className = options.class;
        if(options.text) d.textContent = options.text;
        if(options.html) d.innerHTML = options.html;
        if(options.attrs) Object.keys(options.attrs).forEach(k => d.setAttribute(k, options.attrs[k]));
        return d;
      }

      // Toggle expanded album
      function toggleAlbum(id, e){
        if(e) e.preventDefault();
        const el = document.getElementById(id);
        if(!el) return;
        const willOpen = !el.classList.contains('open');
        el.classList.toggle('open');
        // if opening, smooth-scroll the expanded area into view
        if(willOpen){
          // small timeout to allow CSS to set the open state
          setTimeout(()=>{
            el.scrollIntoView({behavior:'smooth', block:'start'});
          }, 80);
        }
      }

      // Lightbox open
      function openLightbox(src){
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').classList.add('open');
      }

      // Build album cards from JSON data
      fetch('gallery_data.json').then(r => r.json()).then(data => {
        const container = document.getElementById('albums-grid');
        if(!container) return;
        Object.keys(data).sort().forEach((albumName, idx) => {
          const images = data[albumName];
          // sanitize album name for use in ids (replace whitespace with dashes)
          const safeName = albumName.replace(/\s+/g,'-');

          const card = el('div',{class:'album-card', attrs:{'id':`album-${safeName}`}});
          const header = el('div',{class:'album-header'});
          header.appendChild(el('div',{class:'album-title', text:albumName}));
          card.appendChild(header);

          const mosaic = el('div',{class:'album-mosaic'});
          // show up to 4 mosaic thumbnails (open album lightbox at that index)
          images.slice(0,4).forEach((src,i) => {
            const cell = el('div',{class:'mosaic-cell'});
            const img = el('img',{class:'mosaic-thumb', attrs:{src:src, alt:albumName+' '+(i+1)}});
            img.addEventListener('click', () => openLightbox(images, i));
            cell.appendChild(img);
            mosaic.appendChild(cell);
          });
          card.appendChild(mosaic);

          card.appendChild(el('div',{class:'album-desc', text:`${images.length} photos`}));

          const expandedId = `expanded-${safeName}`;
          const viewBtn = el('a',{class:'btn btn-primary btn-sm', text:'VIEW ALBUM ↓', attrs:{href:'#'+expandedId}});
          viewBtn.addEventListener('click', (e) => toggleAlbum(expandedId,e));
          card.appendChild(viewBtn);

          const expanded = el('div',{class:'photo-grid-expanded', attrs:{id:expandedId}});
          const hint = el('div',{class:'upload-hint', html:'📌 These photos are loaded from <code>gallery_data.json</code>'});
          expanded.appendChild(hint);

          const grid = el('div',{class:'expanded-grid'});
          images.forEach((src, idx) => {
            const slot = el('div',{class:'photo-slot'});
            const img = el('img',{attrs:{src:src, alt:''}});
            img.addEventListener('click', (e) => { openLightbox(images, idx); });
            slot.appendChild(img);
            grid.appendChild(slot);
          });
          expanded.appendChild(grid);
          card.appendChild(expanded);

          container.appendChild(card);
        });

        // Attach delegated close for lightbox images if additional handling needed
      }).catch(err => {
        console.error('Could not load gallery_data.json', err);
        const container = document.getElementById('albums-grid');
        if(container) container.appendChild(el('div',{class:'card', text:'No galleries found. Run generate_gallery.py to create gallery_data.json.'}));
      });
    </script>
  </div>

  <!-- Lightbox overlay (album carousel with thumbnails) -->
  <style>
    /* Minimal lightbox styles scoped here so pages work without editing style.css */
    .lb-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:9999}
    .lb-overlay.open{display:flex}
    .lb-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.75)}
    .lb-shell{position:relative;max-width:95%;max-height:90%;z-index:2;display:flex;flex-direction:column;align-items:center}
    .lb-viewport{width:min(1100px,90vw);height:min(700px,70vh);display:flex;align-items:center;justify-content:center;background:#111;border-radius:6px;overflow:hidden}
    .lb-viewport img{max-width:100%;max-height:100%;object-fit:contain;display:block}
    .lb-controls{position:absolute;top:50%;left:12px;transform:translateY(-50%);z-index:3}
    .lb-controls .btn{background:rgba(255,255,255,0.08);border:none;color:#fff;padding:8px 12px;border-radius:4px;cursor:pointer}
    .lb-next{position:absolute;right:12px;top:50%;transform:translateY(-50%)}
    .lb-close{position:relative;margin:10px auto 6px auto;background:transparent;border:0;color:#fff;font-size:14px;cursor:pointer}
    .lb-thumbs{display:flex;gap:6px;padding-top:8px;overflow-x:auto;max-width:90vw}
    .lb-thumbs img{height:64px;cursor:pointer;opacity:0.7}
    .lb-thumbs img.active{outline:2px solid #fff;opacity:1}
    @media (max-width:600px){.lb-viewport{height:50vh}}
  </style>

  <style>
    /* Slide-down transition for expanded album panels */
    .photo-grid-expanded{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .25s ease}
    .photo-grid-expanded.open{max-height:2000px;padding:12px 0}
  </style>

  <div id="lb-overlay" class="lb-overlay" aria-hidden="true">
    <div class="lb-backdrop" onclick="closeLightbox()"></div>
    <div class="lb-shell" role="dialog" aria-modal="true">
      <button class="lb-close" onclick="closeLightbox()">CLOSE ×</button>
      <div class="lb-viewport">
        <button class="lb-controls btn lb-prev" onclick="prevLightbox()">◀</button>
        <img id="lb-img" src="" alt="">
        <!-- removed right/play-like button as requested -->
      </div>
      <div class="lb-thumbs" id="lb-thumbs" aria-hidden="false"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-ribbon"></div>
    <div class="footer-inner">
      <div class="footer-brand">1213PHOTO.COM</div>
      <div class="footer-links">
        <a href="index.html">Home</a><a href="gallery.html">Galleries</a><a href="about.html">About</a>
      </div>
      <div class="footer-copy">© 2026 1213photo.com                 All rights reserved</div>
    </div>
  </footer>

  <script>
    // lightbox state
    const LB = {images:[], idx:0};
    function openLightbox(images, index){
      if(!images || images.length===0) return;
      LB.images = images.slice();
      LB.idx = index || 0;
      renderLightbox();
      document.getElementById('lb-overlay').classList.add('open');
      document.getElementById('lb-overlay').setAttribute('aria-hidden','false');
      document.addEventListener('keydown', lbKeyHandler);
    }
    function closeLightbox(){
      document.getElementById('lb-overlay').classList.remove('open');
      document.getElementById('lb-overlay').setAttribute('aria-hidden','true');
      document.removeEventListener('keydown', lbKeyHandler);
    }
    function renderLightbox(){
      const img = document.getElementById('lb-img');
      img.src = LB.images[LB.idx];
      // thumbs
      const thumbs = document.getElementById('lb-thumbs');
      thumbs.innerHTML = '';
      LB.images.forEach((s,i)=>{
        const t = document.createElement('img');
        t.src = s; t.alt = '';
        if(i===LB.idx) t.classList.add('active');
        t.addEventListener('click', ()=>{ LB.idx = i; renderLightbox(); });
        thumbs.appendChild(t);
      });
    }
    function nextLightbox(){ LB.idx = (LB.idx+1) % LB.images.length; renderLightbox(); }
    function prevLightbox(){ LB.idx = (LB.idx-1+LB.images.length) % LB.images.length; renderLightbox(); }
    function lbKeyHandler(e){ if(e.key==='ArrowRight') nextLightbox(); else if(e.key==='ArrowLeft') prevLightbox(); else if(e.key==='Escape') closeLightbox(); }
  </script>
</body>
